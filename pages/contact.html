<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ — Clipo</title>
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://clipo.app/pages/contact.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#050507;--bg1:#0a0a0f;--border:#1e1e2e;--border2:#2a2a3e;--g1:#00ff88;--text:#f0f0fa;--text2:#9090b0;--text3:#50506a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;line-height:1.8;min-height:100vh}
header{border-bottom:1px solid var(--border);background:rgba(5,5,7,0.95);position:sticky;top:0;z-index:100}
.hdr{max-width:800px;margin:0 auto;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-mark{width:28px;height:28px;background:var(--g1);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.9rem;color:#000}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--text)}
.logo-name em{color:var(--g1);font-style:normal}
.back{font-size:0.72rem;color:var(--text3);text-decoration:none;font-family:'IBM Plex Mono',monospace;transition:color 0.15s}
.back:hover{color:var(--g1)}
main{max-width:600px;margin:0 auto;padding:48px 24px 80px}
h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:10px}
.sub{font-size:0.88rem;color:var(--text2);margin-bottom:36px}
.form-group{margin-bottom:20px}
label{display:block;font-size:0.72rem;color:var(--text3);font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px}
input,select,textarea{
  width:100%;background:var(--bg1);border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:0.88rem;
  padding:12px 14px;outline:none;transition:border-color 0.15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--g1)}
textarea{resize:vertical;min-height:140px;line-height:1.7}
.submit{
  width:100%;padding:14px;background:var(--g1);color:#000;
  border:none;border-radius:3px;font-family:'Syne',sans-serif;font-weight:800;
  font-size:0.95rem;cursor:pointer;transition:all 0.18s;
  box-shadow:0 0 20px rgba(0,255,136,0.25);
}
.submit:hover{background:#fff;box-shadow:0 0 32px rgba(0,255,136,0.4)}
.note{font-size:0.72rem;color:var(--text3);margin-top:20px;text-align:center}
footer{border-top:1px solid var(--border);padding:20px 24px;text-align:center;font-size:0.65rem;color:var(--text3)}
</style>
</head>
<body>
<header>
  <div class="hdr">
    <a href="/" class="logo">
      <div class="logo-mark">C</div>
      <span class="logo-name">Cli<em>po</em></span>
    </a>
    <a href="/" class="back">← ホームへ戻る</a>
  </div>
</header>
<main>
  <h1>お問い合わせ</h1>
  <p class="sub">バグ報告・ご要望・プライバシーに関するお問い合わせはこちらから。</p>
  <form action="https://formspree.io/f/XXXXXXXX" method="POST">
    <div class="form-group">
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" required placeholder="山田 太郎">
    </div>
    <div class="form-group">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required placeholder="example@email.com">
    </div>
    <div class="form-group">
      <label for="type">お問い合わせ種別</label>
      <select id="type" name="type">
        <option value="bug">バグ報告</option>
        <option value="feature">機能リクエスト</option>
        <option value="privacy">プライバシーについて</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="form-group">
      <label for="message">メッセージ</label>
      <textarea id="message" name="message" required placeholder="お問い合わせ内容をご記入ください"></textarea>
    </div>
    <button type="submit" class="submit">送信する →</button>
    <p class="note">通常1〜3営業日以内にご返信いたします。</p>
  </form>
</main>
<footer>© 2025 Clipo — すべての処理はブラウザ内完結</footer>
</body>
</html>
